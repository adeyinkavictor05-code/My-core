<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDGEN · NFT Description Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0e0e1c;
    --card: #13131f;
    --border: #1f1f35;
    --border-bright: #2e2e50;
    --accent: #6c47ff;
    --accent2: #ff4778;
    --accent3: #47ffd4;
    --text: #d8d8f0;
    --dim: #5a5a80;
    --ghost: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,71,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,71,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── HEADER ── */
  header {
    padding: 48px 0 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left {}

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.05em;
    line-height: 1;
    background: linear-gradient(120deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(108,71,255,0.12);
    border: 1px solid rgba(108,71,255,0.3);
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: blink 1.8s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── PANEL ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px;
  }

  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '//';
    color: var(--border-bright);
  }

  /* ── FORM ── */
  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }

  input[type=text], textarea, select {
    width: 100%;
    background: var(--ghost);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  input[type=text]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
  }

  select option { background: var(--card); }

  textarea { min-height: 90px; line-height: 1.6; }

  /* Trait tags */
  .trait-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 40px;
    background: var(--ghost);
    border: 1px solid var(--border);
    padding: 8px;
    margin-bottom: 8px;
  }

  .trait-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(108,71,255,0.15);
    border: 1px solid rgba(108,71,255,0.3);
    padding: 3px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.1s;
  }

  .trait-tag:hover { background: rgba(255,71,120,0.15); border-color: rgba(255,71,120,0.4); }

  .trait-tag .x { color: var(--dim); font-size: 10px; }

  .trait-input-row {
    display: flex;
    gap: 8px;
  }

  .trait-input-row input { flex: 1; }

  .btn-add {
    background: var(--ghost);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .btn-add:hover { border-color: var(--accent); background: rgba(108,71,255,0.1); }

  /* Count slider */
  .count-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .count-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    padding: 0;
    border: none;
    cursor: pointer;
  }

  .count-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .count-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.12em;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-generate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .btn-generate:hover::after { transform: translateX(100%); }
  .btn-generate:hover { background: #7d5fff; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { background: var(--border-bright); cursor: not-allowed; transform: none; }

  /* ── OUTPUT PANEL ── */
  .output-panel {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    min-height: 500px;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .output-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .output-title::before { content: '//'; color: var(--border-bright); }

  .output-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    background: var(--ghost);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Result cards */
  .results-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 520px;
    padding-right: 4px;
  }

  .results-list::-webkit-scrollbar { width: 3px; }
  .results-list::-webkit-scrollbar-track { background: var(--ghost); }
  .results-list::-webkit-scrollbar-thumb { background: var(--accent); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    animation: slideIn 0.3s ease;
    position: relative;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .copy-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .copy-btn.copied { border-color: var(--accent3); color: var(--accent3); }

  .result-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.75;
    color: #b0b0d0;
  }

  /* Empty / loading states */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    color: var(--dim);
    padding: 40px;
  }

  .empty-icon {
    font-size: 40px;
    opacity: 0.3;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.1em;
  }

  .empty-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Loading skeleton */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .skel-line {
    height: 10px;
    background: linear-gradient(90deg, var(--ghost) 25%, var(--border) 50%, var(--ghost) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Progress */
  .progress-wrap {
    margin-top: 16px;
    display: none;
  }

  .progress-wrap.visible { display: block; }

  .progress-bar {
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1;
  }

  .stat-key {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* Tone chips */
  .tone-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tone-chip {
    padding: 5px 10px;
    background: var(--ghost);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }

  .tone-chip.active {
    background: rgba(108,71,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent3);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 18px;
    z-index: 9999;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.25s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Full-width output on mobile */
  @media (max-width: 700px) {
    .output-panel { min-height: 400px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="header-left">
      <div class="logo">VOIDGEN</div>
      <div class="logo-sub">NFT Description Engine · Powered by Claude AI</div>
    </div>
    <div class="badge">
      <span class="badge-dot"></span>
      AI Engine Active
    </div>
  </header>

  <div class="layout">

    <!-- INPUT PANEL -->
    <div class="panel">
      <div class="panel-title">Configure Your Collection</div>

      <div class="field">
        <label>Collection Name</label>
        <input type="text" id="collectionName" placeholder="e.g. Void Wanderers, Dark Pixels..." value="Void Wanderers">
      </div>

      <div class="field">
        <label>Collection Concept / Lore</label>
        <textarea id="lore" placeholder="Brief description of what this collection is about...">Entities that emerged from the digital void, each carrying fragments of lost code and ancient blockchain data. They wander the decentralized metaverse searching for their origin block.</textarea>
      </div>

      <div class="field">
        <label>Traits (press + or Enter to add)</label>
        <div class="trait-wrap" id="traitWrap"></div>
        <div class="trait-input-row">
          <input type="text" id="traitInput" placeholder="e.g. Glitch Eyes, Neon Aura, Obsidian Cloak...">
          <button class="btn-add" id="addTraitBtn">+</button>
        </div>
      </div>

      <div class="field">
        <label>Tone</label>
        <div class="tone-chips" id="toneChips">
          <div class="tone-chip active" data-tone="Mysterious and poetic">Mysterious</div>
          <div class="tone-chip" data-tone="Dark and intense">Dark</div>
          <div class="tone-chip" data-tone="Epic and mythological">Epic</div>
          <div class="tone-chip" data-tone="Technical and cyberpunk">Cyberpunk</div>
          <div class="tone-chip" data-tone="Playful and witty">Playful</div>
          <div class="tone-chip" data-tone="Minimalist and cryptic">Cryptic</div>
        </div>
      </div>

      <div class="field">
        <label>Number of Descriptions</label>
        <div class="count-row">
          <input type="range" id="countSlider" min="1" max="10" value="5">
          <div class="count-display" id="countDisplay">5</div>
        </div>
      </div>

      <button class="btn-generate" id="generateBtn">Generate Descriptions</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel">Initializing engine...</div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="statGenerated">0</div>
          <div class="stat-key">Generated</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statTraits">0</div>
          <div class="stat-key">Traits</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statWords">0</div>
          <div class="stat-key">Avg Words</div>
        </div>
      </div>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="output-panel">
      <div class="output-header">
        <div class="output-title">Generated Output</div>
        <div class="output-actions">
          <button class="btn-sm" id="copyAllBtn">Copy All</button>
          <button class="btn-sm" id="exportBtn">Export .txt</button>
        </div>
      </div>

      <div class="results-list" id="resultsList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">VOID</div>
          <div class="empty-text">Configure your collection<br>and hit Generate</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let traits = ['Glitch Eyes', 'Neon Aura', 'Obsidian Cloak'];
  let selectedTone = 'Mysterious and poetic';
  let generated = [];
  let totalWords = 0;

  // ── INIT TRAITS ──
  function renderTraits() {
    const wrap = document.getElementById('traitWrap');
    wrap.innerHTML = '';
    traits.forEach((t, i) => {
      const tag = document.createElement('div');
      tag.className = 'trait-tag';
      tag.innerHTML = `${t} <span class="x">✕</span>`;
      tag.querySelector('.x').onclick = () => { traits.splice(i, 1); renderTraits(); updateStats(); };
      wrap.appendChild(tag);
    });
    document.getElementById('statTraits').textContent = traits.length;
  }

  function addTrait() {
    const input = document.getElementById('traitInput');
    const val = input.value.trim();
    if (val && !traits.includes(val)) {
      traits.push(val);
      renderTraits();
      updateStats();
    }
    input.value = '';
    input.focus();
  }

  document.getElementById('addTraitBtn').onclick = addTrait;
  document.getElementById('traitInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTrait(); }});

  // ── TONE ──
  document.querySelectorAll('.tone-chip').forEach(chip => {
    chip.onclick = () => {
      document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedTone = chip.dataset.tone;
    };
  });

  // ── SLIDER ──
  const slider = document.getElementById('countSlider');
  const countDisplay = document.getElementById('countDisplay');
  slider.oninput = () => { countDisplay.textContent = slider.value; };

  // ── STATS ──
  function updateStats() {
    document.getElementById('statGenerated').textContent = generated.length;
    document.getElementById('statTraits').textContent = traits.length;
    if (generated.length > 0) {
      const avg = Math.round(generated.reduce((s, d) => s + d.split(' ').length, 0) / generated.length);
      document.getElementById('statWords').textContent = avg;
    }
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── RENDER RESULTS ──
  function renderResults() {
    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    if (generated.length === 0) {
      list.innerHTML = `<div class="empty-state" id="emptyState">
        <div class="empty-icon">VOID</div>
        <div class="empty-text">Configure your collection<br>and hit Generate</div>
      </div>`;
      return;
    }
    generated.forEach((desc, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-num">
          <span>NFT #${String(i + 1).padStart(3, '0')}</span>
          <button class="copy-btn" data-idx="${i}">Copy</button>
        </div>
        <div class="result-text">${desc}</div>
      `;
      card.querySelector('.copy-btn').onclick = function() {
        navigator.clipboard.writeText(desc);
        this.textContent = 'Copied!';
        this.classList.add('copied');
        setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('copied'); }, 1500);
      };
      list.appendChild(card);
    });
  }

  // ── SKELETON LOADER ──
  function showSkeletons(n) {
    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      sk.innerHTML = `
        <div class="skel-line" style="width:30%"></div>
        <div class="skel-line" style="width:100%"></div>
        <div class="skel-line" style="width:95%"></div>
        <div class="skel-line" style="width:80%"></div>
      `;
      list.appendChild(sk);
    }
  }

  // ── GENERATE ──
  document.getElementById('generateBtn').onclick = async () => {
    const name = document.getElementById('collectionName').value.trim() || 'My Collection';
    const lore = document.getElementById('lore').value.trim();
    const count = parseInt(slider.value);

    if (traits.length === 0) { showToast('Add at least one trait!'); return; }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Generating...';

    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    progressWrap.classList.add('visible');
    progressFill.style.width = '10%';
    progressLabel.textContent = 'Connecting to AI engine...';

    showSkeletons(count);

    const prompt = `You are an expert NFT copywriter. Generate exactly ${count} unique, distinct NFT descriptions for a collection called "${name}".

Collection Lore: ${lore || 'No specific lore provided.'}
Available Traits: ${traits.join(', ')}
Tone: ${selectedTone}

Rules:
- Each description must be 40-70 words
- Each must feel unique — different opening, different structure
- Naturally weave in 1-3 of the traits per description (don't list them mechanically)
- Do NOT number the descriptions
- Separate each description with exactly "---" on its own line
- No intro text, no outro text — just the descriptions separated by ---
- Make them feel like they were written by a skilled creative writer, not a template

Output format:
[description 1]
---
[description 2]
---
[description 3]`;

    try {
      progressFill.style.width = '40%';
      progressLabel.textContent = 'AI is writing your descriptions...';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      progressFill.style.width = '80%';
      progressLabel.textContent = 'Parsing results...';

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const descriptions = raw.split('---').map(d => d.trim()).filter(d => d.length > 20);

      generated = descriptions.slice(0, count);

      progressFill.style.width = '100%';
      progressLabel.textContent = `${generated.length} descriptions ready!`;

      setTimeout(() => {
        renderResults();
        updateStats();
        progressWrap.classList.remove('visible');
        progressFill.style.width = '0%';
        showToast(`${generated.length} descriptions generated!`);
      }, 500);

    } catch (err) {
      console.error(err);
      progressLabel.textContent = 'Error — check console';
      progressFill.style.width = '0%';
      showToast('Something went wrong. Try again.');
      document.getElementById('resultsList').innerHTML = `<div class="empty-state"><div class="empty-text">Generation failed.<br>Please try again.</div></div>`;
    }

    btn.disabled = false;
    btn.textContent = 'Generate Descriptions';
  };

  // ── COPY ALL ──
  document.getElementById('copyAllBtn').onclick = () => {
    if (generated.length === 0) { showToast('Nothing to copy yet!'); return; }
    const text = generated.map((d, i) => `NFT #${String(i+1).padStart(3,'0')}\n${d}`).join('\n\n---\n\n');
    navigator.clipboard.writeText(text);
    showToast('All descriptions copied!');
  };

  // ── EXPORT ──
  document.getElementById('exportBtn').onclick = () => {
    if (generated.length === 0) { showToast('Nothing to export yet!'); return; }
    const name = document.getElementById('collectionName').value.trim() || 'collection';
    const text = `VOIDGEN NFT Description Engine\nCollection: ${name}\nGenerated: ${new Date().toLocaleDateString()}\n\n` +
      generated.map((d, i) => `NFT #${String(i+1).padStart(3,'0')}\n${d}`).join('\n\n---\n\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${name.replace(/\s+/g,'-').toLowerCase()}-descriptions.txt`;
    a.click();
    showToast('File downloaded!');
  };

  // ── INIT ──
  renderTraits();
  updateStats();
</script>
</body>
</html>
